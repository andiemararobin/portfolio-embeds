<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study AR03 — Before & After</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #3d5159; max-width: 680px; margin: 0 auto; padding: 0.75rem; }
  .labels { display: flex; justify-content: space-between; font-size: 11px; color: #3d5159; letter-spacing: 0.06em; padding-bottom: 4px; }
  .wrap { position: relative; width: 100%; aspect-ratio: 640 / 400; overflow: hidden; cursor: col-resize; user-select: none; }
  .panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .after-panel { clip-path: inset(0 50% 0 0); }
  .divider-line { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: #3d5159; pointer-events: none; }
  .handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #3d5159; display: flex; align-items: center; justify-content: center; pointer-events: none; font-size: 10px; color: #3d5159; letter-spacing: -2px; }
  .hint { text-align: center; font-size: 11px; color: #3d5159; padding-top: 4px; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
</head>
<body>

<div class="labels"><span>Before</span><span>After</span></div>

<div class="wrap" id="wrap">

  <svg class="panel" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>Before: three isolated rings — student staff, learning institution, campus employers — with no shared infrastructure connecting them</title>
    <desc>Three concentric-style rings sit disconnected from each other. The inner ring shows student staff without support systems. The middle ring shows a learning institution without shared processes. The outer ring shows campus employers with inconsistent onboarding. No connections run between them.</desc>
    <rect width="640" height="400" fill="#eef1f2"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">no shared infrastructure</text>
    <circle cx="320" cy="205" r="170" fill="none" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.4"/>
    <text x="320" y="48" text-anchor="middle" font-size="11" fill="#3d5159" opacity="0.4">900+ campus employers</text>
    <text x="320" y="62" text-anchor="middle" font-size="11" fill="#3d5159" opacity="0.4">inconsistent onboarding</text>
    <circle cx="320" cy="205" r="110" fill="none" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.55"/>
    <text x="320" y="104" text-anchor="middle" font-size="11" fill="#3d5159" opacity="0.55">public-facing learning institution</text>
    <text x="320" y="118" text-anchor="middle" font-size="11" fill="#3d5159" opacity="0.55">no shared processes</text>
    <circle cx="320" cy="205" r="54" fill="#fff" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="320" y="199" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">15+ student</text>
    <text x="320" y="215" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">staff</text>
    <text x="320" y="362" text-anchor="middle" font-size="11" fill="#3d5159">equity aspirational · access inconsistent · students unsupported</text>
  </svg>

  <svg class="panel after-panel" id="after" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>After: three connected rings — student staff supported by wellness and public service processes, learning institution with equity infrastructure, campus-wide programme with accessible onboarding and grant oversight</title>
    <desc>Three concentric rings now filled and connected. The inner ring shows student staff supported by wellness liaison and public service processes. The middle ring shows a learning institution with shared equity processes. The outer ring shows 900+ campus employers connected through accessible onboarding, equity evaluation, and $6M+ in grant funding oversight.</desc>
    <rect width="640" height="400" fill="#fff"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">equity built into the architecture</text>
    <circle cx="320" cy="205" r="170" fill="#eef1f2" stroke="#3d5159" stroke-width="0.5"/>
    <text x="320" y="48" text-anchor="middle" font-size="11" fill="#3d5159">900+ employers · 3,000+ students</text>
    <text x="320" y="62" text-anchor="middle" font-size="11" fill="#3d5159">accessible onboarding · equity evaluation</text>
    <text x="490" y="205" text-anchor="middle" font-size="11" fill="#3d5159">$6M+</text>
    <text x="490" y="219" text-anchor="middle" font-size="11" fill="#3d5159">grant oversight</text>
    <circle cx="320" cy="205" r="110" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="104" text-anchor="middle" font-size="11" fill="#3d5159">public-facing learning institution</text>
    <text x="320" y="118" text-anchor="middle" font-size="11" fill="#3d5159">social safety net awareness</text>
    <text x="222" y="205" text-anchor="middle" font-size="11" fill="#3d5159">positive</text>
    <text x="222" y="219" text-anchor="middle" font-size="11" fill="#3d5159">space pilot</text>
    <circle cx="320" cy="205" r="54" fill="#fff" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="192" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">15+ student</text>
    <text x="320" y="206" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">staff</text>
    <text x="320" y="220" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">wellness liaison</text>
    <text x="320" y="362" text-anchor="middle" font-size="11" fill="#3d5159">equity structural · access consistent · students supported</text>
  </svg>

  <div class="divider-line" id="divider"></div>
  <div class="handle" id="handle">&#8592;&#8594;</div>
</div>

<p class="hint">drag to compare</p>

<script>
  const wrap=document.getElementById('wrap'),after=document.getElementById('after'),divider=document.getElementById('divider'),handle=document.getElementById('handle');
  let dragging=false;
  function setPos(x){const r=wrap.getBoundingClientRect(),p=Math.max(4,Math.min(96,((x-r.left)/r.width)*100));after.style.clipPath='inset(0 '+(100-p)+'% 0 0)';divider.style.left=p+'%';handle.style.left=p+'%';}
  wrap.addEventListener('mousedown',e=>{dragging=true;setPos(e.clientX);});
  window.addEventListener('mousemove',e=>{if(dragging)setPos(e.clientX);});
  window.addEventListener('mouseup',()=>{dragging=false;});
  wrap.addEventListener('touchstart',e=>{dragging=true;setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging)setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false;});
</script>
</body>
</html>
