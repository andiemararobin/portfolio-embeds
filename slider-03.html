<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study AR03 — Before &amp; After</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #3d5159;
      max-width: 680px;
      margin: 0 auto;
      padding: 0.75rem;
    }
    .col-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #3d5159;
      letter-spacing: 0.06em;
      padding-bottom: 4px;
    }
    .wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 640 / 420;
      overflow: hidden;
      cursor: col-resize;
      user-select: none;
    }
    .panel {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .after-panel { clip-path: inset(0 50% 0 0); }
    .divider-line {
      position: absolute;
      top: 0; left: 50%;
      width: 1px; height: 100%;
      background: #3d5159;
      pointer-events: none;
    }
    .handle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #3d5159;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-size: 10px;
      color: #3d5159;
      letter-spacing: -2px;
    }
    .hint {
      text-align: center;
      font-size: 11px;
      color: #3d5159;
      padding-top: 4px;
      opacity: 0.6;
    }
    svg text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      fill: #3d5159;
    }
  </style>
</head>
<body>

  <div class="col-labels"><span>Before</span><span>After</span></div>

  <div class="wrap" id="wrap">

    <!-- BEFORE panel -->
    <svg class="panel" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" role="img">
      <title>Before: three isolated rings with no shared infrastructure</title>
      <desc>Three concentric dashed rings sit disconnected. The outer ring: 900+ campus employers, inconsistent onboarding. The middle ring: public-facing learning institution, no shared processes. The inner ring: 15+ student staff, unsupported.</desc>

      <rect width="640" height="420" fill="#eef1f2"/>

      <!-- Outer ring -->
      <circle cx="320" cy="215" r="185" fill="none" stroke="#3d5159" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.35"/>
      <!-- Middle ring -->
      <circle cx="320" cy="215" r="120" fill="none" stroke="#3d5159" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.5"/>
      <!-- Inner ring -->
      <circle cx="320" cy="215" r="58" fill="#fff" fill-opacity="0.5" stroke="#3d5159" stroke-width="0.75" stroke-dasharray="3 3"/>

      <!-- Inner label -->
      <text x="320" y="209" text-anchor="middle" font-size="11" opacity="0.55">15+ student</text>
      <text x="320" y="224" text-anchor="middle" font-size="11" opacity="0.55">staff</text>

      <!-- Middle ring label -->
      <text x="320" y="108" text-anchor="middle" font-size="11" opacity="0.5">public-facing learning institution</text>
      <text x="320" y="122" text-anchor="middle" font-size="11" opacity="0.4">no shared processes</text>

      <!-- Outer ring label -->
      <text x="320" y="22" text-anchor="middle" font-size="11" opacity="0.4">900+ campus employers</text>
      <text x="320" y="36" text-anchor="middle" font-size="11" opacity="0.35">inconsistent onboarding</text>

      <!-- Caption -->
      <text x="320" y="398" text-anchor="middle" font-size="11" opacity="0.45">equity aspirational · access inconsistent · students unsupported</text>
    </svg>

    <!-- AFTER panel -->
    <svg class="panel after-panel" id="after" viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" role="img">
      <title>After: three connected rings with equity built into the architecture</title>
      <desc>Three concentric solid rings now filled and connected. The outer ring: 900+ employers, 3,000+ students, accessible onboarding, equity evaluation, $6M+ grant oversight, workplace environments assessed for meaningful HPSM inclusion. The middle ring: public-facing learning institution, social safety net awareness, equity and inclusion pilot. The inner ring: 15+ student staff, wellness liaison, shared processes.</desc>

      <rect width="640" height="420" fill="#fff"/>

      <!-- Outer ring -->
      <circle cx="320" cy="215" r="185" fill="#eef1f2" stroke="#3d5159" stroke-width="0.75"/>
      <!-- Middle ring -->
      <circle cx="320" cy="215" r="120" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.75"/>
      <!-- Inner ring -->
      <circle cx="320" cy="215" r="58" fill="#fff" stroke="#5c7e8f" stroke-width="0.75"/>

      <!-- Inner label -->
      <text x="320" y="206" text-anchor="middle" font-size="11">15+ student staff</text>
      <text x="320" y="221" text-anchor="middle" font-size="11">wellness liaison</text>

      <!-- Middle ring label -->
      <text x="320" y="108" text-anchor="middle" font-size="11">public-facing learning institution</text>
      <text x="320" y="122" text-anchor="middle" font-size="11" opacity="0.7">social safety net awareness · equity pilot</text>

      <!-- Outer ring label -->
      <text x="320" y="22" text-anchor="middle" font-size="11">900+ employers · 3,000+ students</text>
      <text x="320" y="36" text-anchor="middle" font-size="11" opacity="0.7">accessible onboarding · equity evaluation · $6M+ grants</text>

      <!-- Caption -->
      <text x="320" y="398" text-anchor="middle" font-size="11" opacity="0.7">equity structural · access consistent · students supported</text>
    </svg>

    <div class="divider-line" id="divider"></div>
    <div class="handle" id="handle">&#8592;&#8594;</div>
  </div>

  <p class="hint">drag to compare</p>

  <script>
    const wrap = document.getElementById('wrap');
    const after = document.getElementById('after');
    const divider = document.getElementById('divider');
    const handle = document.getElementById('handle');
    let dragging = false;

    function setPos(x) {
      const r = wrap.getBoundingClientRect();
      const p = Math.max(4, Math.min(96, ((x - r.left) / r.width) * 100));
      after.style.clipPath = 'inset(0 ' + (100 - p) + '% 0 0)';
      divider.style.left = p + '%';
      handle.style.left = p + '%';
    }

    wrap.addEventListener('mousedown', e => { dragging = true; setPos(e.clientX); });
    window.addEventListener('mousemove', e => { if (dragging) setPos(e.clientX); });
    window.addEventListener('mouseup', () => { dragging = false; });
    wrap.addEventListener('touchstart', e => { dragging = true; setPos(e.touches[0].clientX); }, { passive: true });
    window.addEventListener('touchmove', e => { if (dragging) setPos(e.touches[0].clientX); }, { passive: true });
    window.addEventListener('touchend', () => { dragging = false; });
  </script>

</body>
</html>
