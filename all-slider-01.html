<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study 01 — Before & After</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #3d5159; max-width: 680px; margin: 0 auto; padding: 0.75rem; }
  .labels { display: flex; justify-content: space-between; font-size: 11px; color: #3d5159; letter-spacing: 0.06em; padding-bottom: 4px; }
  .wrap { position: relative; width: 100%; aspect-ratio: 640 / 400; overflow: hidden; cursor: col-resize; user-select: none; }
  .panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .after-panel { clip-path: inset(0 50% 0 0); }
  .divider-line { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: #3d5159; pointer-events: none; }
  .handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #3d5159; display: flex; align-items: center; justify-content: center; pointer-events: none; font-size: 10px; color: #3d5159; letter-spacing: -2px; }
  .hint { text-align: center; font-size: 11px; color: #3d5159; padding-top: 4px; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<div class="labels"><span>Before</span><span>After</span></div>
<div class="wrap" id="wrap">

  <svg class="panel" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>Before: infrastructure collapses, information severs</title>
    <rect width="640" height="400" fill="#eef1f2"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">when infrastructure fails</text>
    <rect x="40" y="60" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="77" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">civilians</text>
    <rect x="40" y="108" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="125" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">displaced people</text>
    <rect x="40" y="156" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="173" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">aid workers</text>
    <rect x="40" y="204" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="221" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">community leaders</text>
    <rect x="220" y="60" width="200" height="178" rx="4" fill="none" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="320" y="140" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">infrastructure</text>
    <text x="320" y="158" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">collapsed</text>
    <text x="320" y="100" text-anchor="middle" font-size="18" fill="#3d5159">&#215;</text>
    <line x1="190" y1="77" x2="218" y2="100" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="190" y1="125" x2="218" y2="130" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="190" y1="173" x2="218" y2="160" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="2 3"/>
    <line x1="190" y1="221" x2="218" y2="190" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="2 3"/>
    <rect x="450" y="60" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.35"/>
    <text x="525" y="77" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159" opacity="0.35">emergency services</text>
    <rect x="450" y="108" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.35"/>
    <text x="525" y="125" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159" opacity="0.35">hospitals</text>
    <rect x="450" y="156" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.35"/>
    <text x="525" y="173" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159" opacity="0.35">food · shelter</text>
    <rect x="450" y="204" width="150" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.35"/>
    <text x="525" y="221" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159" opacity="0.35">safety</text>
    <text x="320" y="365" text-anchor="middle" font-size="11" fill="#3d5159">knowledge severs with the network</text>
  </svg>

  <svg class="panel after-panel" id="after" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>After: accessible design restores the connection</title>
    <defs>
      <marker id="ay" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#5c7e8f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <rect width="640" height="400" fill="#fff"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">when design holds</text>
    <rect x="40" y="60" width="150" height="34" rx="4" fill="#eef1f2" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="77" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">civilians</text>
    <rect x="40" y="108" width="150" height="34" rx="4" fill="#eef1f2" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="125" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">displaced people</text>
    <rect x="40" y="156" width="150" height="34" rx="4" fill="#eef1f2" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="173" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">aid workers</text>
    <rect x="40" y="204" width="150" height="34" rx="4" fill="#eef1f2" stroke="#3d5159" stroke-width="0.5"/>
    <text x="115" y="221" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">community leaders</text>
    <rect x="220" y="60" width="200" height="178" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="135" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3d5159">accessible interface</text>
    <text x="320" y="168" text-anchor="middle" font-size="11" fill="#3d5159">no instruction needed</text>
    <text x="320" y="184" text-anchor="middle" font-size="11" fill="#3d5159">any language · any literacy</text>
    <line x1="190" y1="77" x2="218" y2="112" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <line x1="190" y1="125" x2="218" y2="122" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <line x1="190" y1="173" x2="218" y2="138" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <line x1="190" y1="221" x2="218" y2="155" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <line x1="420" y1="100" x2="448" y2="77" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <line x1="420" y1="130" x2="448" y2="125" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <line x1="420" y1="158" x2="448" y2="173" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <line x1="420" y1="188" x2="448" y2="221" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ay)"/>
    <rect x="450" y="60" width="150" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="525" y="77" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">emergency services</text>
    <rect x="450" y="108" width="150" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="525" y="125" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">hospitals</text>
    <rect x="450" y="156" width="150" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="525" y="173" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">food · shelter</text>
    <rect x="450" y="204" width="150" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="525" y="221" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">safety</text>
    <text x="320" y="365" text-anchor="middle" font-size="11" fill="#3d5159">simplicity in service of the people being served</text>
  </svg>

  <div class="divider-line" id="divider"></div>
  <div class="handle" id="handle">&#8592;&#8594;</div>
</div>
<p class="hint">drag to compare</p>
<script>
  const wrap=document.getElementById('wrap'),after=document.getElementById('after'),divider=document.getElementById('divider'),handle=document.getElementById('handle');
  let dragging=false;
  function setPos(x){const r=wrap.getBoundingClientRect(),p=Math.max(4,Math.min(96,((x-r.left)/r.width)*100));after.style.clipPath='inset(0 '+(100-p)+'% 0 0)';divider.style.left=p+'%';handle.style.left=p+'%';}
  wrap.addEventListener('mousedown',e=>{dragging=true;setPos(e.clientX);});
  window.addEventListener('mousemove',e=>{if(dragging)setPos(e.clientX);});
  window.addEventListener('mouseup',()=>{dragging=false;});
  wrap.addEventListener('touchstart',e=>{dragging=true;setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging)setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false;});
</script>
</body>
</html>
