<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study 02 — Before & After</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #3d5159; max-width: 680px; margin: 0 auto; padding: 0.75rem; }
  .labels { display: flex; justify-content: space-between; font-size: 11px; color: #3d5159; letter-spacing: 0.06em; padding-bottom: 4px; }
  .wrap { position: relative; width: 100%; aspect-ratio: 640 / 400; overflow: hidden; cursor: col-resize; user-select: none; }
  .panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .after-panel { clip-path: inset(0 50% 0 0); }
  .divider-line { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: #3d5159; pointer-events: none; }
  .handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #3d5159; display: flex; align-items: center; justify-content: center; pointer-events: none; font-size: 10px; color: #3d5159; letter-spacing: -2px; }
  .hint { text-align: center; font-size: 11px; color: #3d5159; padding-top: 4px; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<div class="labels"><span>Before</span><span>After</span></div>
<div class="wrap" id="wrap">

  <svg class="panel" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>Before: people isolated, carrying knowledge and grief alone</title>
    <rect width="640" height="400" fill="#eef1f2"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">carrying it alone</text>
    <circle cx="130" cy="100" r="28" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="130" y="97" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">family</text>
    <text x="130" y="111" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <circle cx="510" cy="100" r="28" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="510" y="97" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">family</text>
    <text x="510" y="111" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <circle cx="100" cy="210" r="28" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="100" y="207" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">informal</text>
    <text x="100" y="221" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">carer</text>
    <circle cx="540" cy="210" r="28" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="540" y="207" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">informal</text>
    <text x="540" y="221" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">carer</text>
    <circle cx="180" cy="310" r="28" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="180" y="307" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">community</text>
    <text x="180" y="321" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <circle cx="460" cy="310" r="28" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="460" y="307" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">community</text>
    <text x="460" y="321" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <text x="320" y="372" text-anchor="middle" font-size="11" fill="#3d5159">knowledge held alone · grief carried alone · decisions made under urgency</text>
  </svg>

  <svg class="panel after-panel" id="after" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>After: people connected through shared knowledge, peer support, and conditions for learning</title>
    <rect width="640" height="400" fill="#fff"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">finding their own way through</text>
    <line x1="158" y1="107" x2="287" y2="183" stroke="#5c7e8f" stroke-width="0.5"/>
    <line x1="482" y1="107" x2="353" y2="183" stroke="#5c7e8f" stroke-width="0.5"/>
    <line x1="127" y1="210" x2="287" y2="200" stroke="#5c7e8f" stroke-width="0.5"/>
    <line x1="513" y1="210" x2="353" y2="200" stroke="#5c7e8f" stroke-width="0.5"/>
    <line x1="205" y1="303" x2="295" y2="223" stroke="#5c7e8f" stroke-width="0.5"/>
    <line x1="435" y1="303" x2="345" y2="223" stroke="#5c7e8f" stroke-width="0.5"/>
    <line x1="158" y1="107" x2="482" y2="107" stroke="#5c7e8f" stroke-width="0.5" opacity="0.3"/>
    <line x1="127" y1="210" x2="513" y2="210" stroke="#5c7e8f" stroke-width="0.5" opacity="0.3"/>
    <line x1="205" y1="303" x2="435" y2="303" stroke="#5c7e8f" stroke-width="0.5" opacity="0.3"/>
    <circle cx="320" cy="200" r="46" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="191" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#3d5159">shared space</text>
    <text x="320" y="205" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">meal · peers</text>
    <text x="320" y="219" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">grief support</text>
    <circle cx="130" cy="100" r="28" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="130" y="97" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">family</text>
    <text x="130" y="111" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <circle cx="510" cy="100" r="28" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="510" y="97" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">family</text>
    <text x="510" y="111" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <circle cx="100" cy="210" r="28" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="100" y="207" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">informal</text>
    <text x="100" y="221" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">carer</text>
    <circle cx="540" cy="210" r="28" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="540" y="207" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">informal</text>
    <text x="540" y="221" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">carer</text>
    <circle cx="180" cy="310" r="28" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="180" y="307" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">community</text>
    <text x="180" y="321" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <circle cx="460" cy="310" r="28" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="460" y="307" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">community</text>
    <text x="460" y="321" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">member</text>
    <text x="320" y="372" text-anchor="middle" font-size="11" fill="#3d5159">knowledge shared · grief held together · decisions made with dignity</text>
  </svg>

  <div class="divider-line" id="divider"></div>
  <div class="handle" id="handle">&#8592;&#8594;</div>
</div>
<p class="hint">drag to compare</p>
<script>
  const wrap=document.getElementById('wrap'),after=document.getElementById('after'),divider=document.getElementById('divider'),handle=document.getElementById('handle');
  let dragging=false;
  function setPos(x){const r=wrap.getBoundingClientRect(),p=Math.max(4,Math.min(96,((x-r.left)/r.width)*100));after.style.clipPath='inset(0 '+(100-p)+'% 0 0)';divider.style.left=p+'%';handle.style.left=p+'%';}
  wrap.addEventListener('mousedown',e=>{dragging=true;setPos(e.clientX);});
  window.addEventListener('mousemove',e=>{if(dragging)setPos(e.clientX);});
  window.addEventListener('mouseup',()=>{dragging=false;});
  wrap.addEventListener('touchstart',e=>{dragging=true;setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging)setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false;});
</script>
</body>
</html>
