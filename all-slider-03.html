<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study 03 — Before & After</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #3d5159; max-width: 680px; margin: 0 auto; padding: 0.75rem; }
  .labels { display: flex; justify-content: space-between; font-size: 11px; color: #3d5159; letter-spacing: 0.06em; padding-bottom: 4px; }
  .wrap { position: relative; width: 100%; aspect-ratio: 640 / 400; overflow: hidden; cursor: col-resize; user-select: none; }
  .panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .after-panel { clip-path: inset(0 50% 0 0); }
  .divider-line { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: #3d5159; pointer-events: none; }
  .handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #3d5159; display: flex; align-items: center; justify-content: center; pointer-events: none; font-size: 10px; color: #3d5159; letter-spacing: -2px; }
  .hint { text-align: center; font-size: 11px; color: #3d5159; padding-top: 4px; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<div class="labels"><span>Before</span><span>After</span></div>
<div class="wrap" id="wrap">

  <svg class="panel" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>Before: gaps between a person and their environment create friction and waiting</title>
    <rect width="640" height="400" fill="#eef1f2"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">the gap is in the environment</text>
    <circle cx="320" cy="200" r="36" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="320" y="196" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">graduate</text>
    <text x="320" y="210" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">student</text>
    <rect x="250" y="50" width="140" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.5"/>
    <text x="320" y="67" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159" opacity="0.5">thesis work</text>
    <line x1="320" y1="164" x2="320" y2="86" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <rect x="60" y="183" width="130" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.5"/>
    <text x="125" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159" opacity="0.5">care aids</text>
    <line x1="284" y1="200" x2="192" y2="200" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <rect x="450" y="183" width="130" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.5"/>
    <text x="515" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159" opacity="0.5">daily needs</text>
    <line x1="356" y1="200" x2="448" y2="200" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <rect x="100" y="300" width="140" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.5"/>
    <text x="170" y="317" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159" opacity="0.5">night hours</text>
    <line x1="295" y1="224" x2="210" y2="298" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <rect x="400" y="300" width="140" height="34" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5" opacity="0.5"/>
    <text x="470" y="317" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159" opacity="0.5">shift changes</text>
    <line x1="345" y1="224" x2="430" y2="298" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <text x="320" y="372" text-anchor="middle" font-size="11" fill="#3d5159">inadequate tools · friction · waiting · needs unmet or met late</text>
  </svg>

  <svg class="panel after-panel" id="after" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>After: a zero-cost communication tool designed by the person closes every gap</title>
    <defs>
      <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#5c7e8f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <rect width="640" height="400" fill="#fff"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">the tool closes the gap</text>
    <line x1="320" y1="164" x2="320" y2="86" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ab)"/>
    <line x1="284" y1="200" x2="192" y2="200" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ab)"/>
    <line x1="356" y1="200" x2="448" y2="200" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ab)"/>
    <line x1="295" y1="224" x2="210" y2="298" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ab)"/>
    <line x1="345" y1="224" x2="430" y2="298" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ab)"/>
    <circle cx="320" cy="200" r="36" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="191" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#3d5159">graduate</text>
    <text x="320" y="205" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#3d5159">student</text>
    <text x="320" y="219" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3d5159">+ their tool</text>
    <rect x="250" y="50" width="140" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="67" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">thesis work</text>
    <rect x="60" y="183" width="130" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="125" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">care aids</text>
    <rect x="450" y="183" width="130" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="515" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">daily needs</text>
    <rect x="100" y="300" width="140" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="170" y="317" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">night hours</text>
    <rect x="400" y="300" width="140" height="34" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="470" y="317" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3d5159">shift changes</text>
    <text x="320" y="372" text-anchor="middle" font-size="11" fill="#3d5159">zero cost · no technology · designed by the person · works in any context</text>
  </svg>

  <div class="divider-line" id="divider"></div>
  <div class="handle" id="handle">&#8592;&#8594;</div>
</div>
<p class="hint">drag to compare</p>
<script>
  const wrap=document.getElementById('wrap'),after=document.getElementById('after'),divider=document.getElementById('divider'),handle=document.getElementById('handle');
  let dragging=false;
  function setPos(x){const r=wrap.getBoundingClientRect(),p=Math.max(4,Math.min(96,((x-r.left)/r.width)*100));after.style.clipPath='inset(0 '+(100-p)+'% 0 0)';divider.style.left=p+'%';handle.style.left=p+'%';}
  wrap.addEventListener('mousedown',e=>{dragging=true;setPos(e.clientX);});
  window.addEventListener('mousemove',e=>{if(dragging)setPos(e.clientX);});
  window.addEventListener('mouseup',()=>{dragging=false;});
  wrap.addEventListener('touchstart',e=>{dragging=true;setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging)setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false;});
</script>
</body>
</html>
