<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study 04 — Before & After</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #3d5159; max-width: 680px; margin: 0 auto; padding: 0.75rem; }
  .labels { display: flex; justify-content: space-between; font-size: 11px; color: #3d5159; letter-spacing: 0.06em; padding-bottom: 4px; }
  .wrap { position: relative; width: 100%; aspect-ratio: 640 / 400; overflow: hidden; cursor: col-resize; user-select: none; }
  .panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .after-panel { clip-path: inset(0 50% 0 0); }
  .divider-line { position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: #3d5159; pointer-events: none; }
  .handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #3d5159; display: flex; align-items: center; justify-content: center; pointer-events: none; font-size: 10px; color: #3d5159; letter-spacing: -2px; }
  .hint { text-align: center; font-size: 11px; color: #3d5159; padding-top: 4px; }
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<div class="labels"><span>Before</span><span>After</span></div>
<div class="wrap" id="wrap">

  <svg class="panel" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>Before: policy, practice, and culture exist in isolation</title>
    <rect width="640" height="400" fill="#eef1f2"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">policy alone is not enough</text>
    <rect x="60" y="80" width="155" height="80" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="137" y="113" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3d5159">policy</text>
    <text x="137" y="133" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">exists on paper</text>
    <rect x="243" y="80" width="155" height="80" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="320" y="113" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3d5159">practice</text>
    <text x="320" y="133" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">unchanged</text>
    <rect x="426" y="80" width="155" height="80" rx="4" fill="#fff" stroke="#3d5159" stroke-width="0.5"/>
    <text x="503" y="113" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3d5159">culture</text>
    <text x="503" y="133" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">as it always was</text>
    <rect x="195" y="230" width="250" height="70" rx="4" fill="none" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 3"/>
    <text x="320" y="258" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#3d5159">accessibility</text>
    <text x="320" y="278" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">added on after the fact</text>
    <line x1="215" y1="160" x2="215" y2="228" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <line x1="320" y1="160" x2="320" y2="228" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <line x1="425" y1="160" x2="425" y2="228" stroke="#3d5159" stroke-width="0.5" stroke-dasharray="3 4"/>
    <text x="320" y="358" text-anchor="middle" font-size="11" fill="#3d5159">legal rights exist · effective rights do not · the gap remains</text>
  </svg>

  <svg class="panel after-panel" id="after" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>After: policy, practice, and culture converge — accessibility built in from the beginning</title>
    <defs>
      <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#5c7e8f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <rect width="640" height="400" fill="#fff"/>
    <text x="320" y="26" text-anchor="middle" font-size="11" fill="#3d5159" letter-spacing="1">when enough people agree it's normal</text>
    <rect x="60" y="80" width="155" height="80" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="137" y="113" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3d5159">policy</text>
    <text x="137" y="133" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">updated meaningfully</text>
    <rect x="243" y="80" width="155" height="80" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="113" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3d5159">practice</text>
    <text x="320" y="133" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">changed from within</text>
    <rect x="426" y="80" width="155" height="80" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="503" y="113" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3d5159">culture</text>
    <text x="503" y="133" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">accessibility is normal</text>
    <line x1="190" y1="162" x2="280" y2="228" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ac)"/>
    <line x1="320" y1="162" x2="320" y2="228" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ac)"/>
    <line x1="450" y1="162" x2="360" y2="228" stroke="#5c7e8f" stroke-width="0.5" marker-end="url(#ac)"/>
    <rect x="195" y="230" width="250" height="70" rx="4" fill="#dde6ea" stroke="#5c7e8f" stroke-width="0.5"/>
    <text x="320" y="258" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3d5159">accessibility</text>
    <text x="320" y="278" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3d5159">built in from the beginning</text>
    <text x="320" y="358" text-anchor="middle" font-size="11" fill="#3d5159">legal rights exist · effective rights exist · the gap is closed</text>
  </svg>

  <div class="divider-line" id="divider"></div>
  <div class="handle" id="handle">&#8592;&#8594;</div>
</div>
<p class="hint">drag to compare</p>
<script>
  const wrap=document.getElementById('wrap'),after=document.getElementById('after'),divider=document.getElementById('divider'),handle=document.getElementById('handle');
  let dragging=false;
  function setPos(x){const r=wrap.getBoundingClientRect(),p=Math.max(4,Math.min(96,((x-r.left)/r.width)*100));after.style.clipPath='inset(0 '+(100-p)+'% 0 0)';divider.style.left=p+'%';handle.style.left=p+'%';}
  wrap.addEventListener('mousedown',e=>{dragging=true;setPos(e.clientX);});
  window.addEventListener('mousemove',e=>{if(dragging)setPos(e.clientX);});
  window.addEventListener('mouseup',()=>{dragging=false;});
  wrap.addEventListener('touchstart',e=>{dragging=true;setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging)setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false;});
</script>
</body>
</html>
